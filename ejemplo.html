<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación · Vista previa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* ===========================
            VARIABLES
    =========================== */

    :root {
      --paper: #F4EAD8;
      --paper2: #EBD9BF;
      --blue: #355D7A;
      --blue-light: #4D7293;
      --gold: #B79A63;
      --text: #3F4B58;
      --white: #ffffff;
    }

    /* ===========================
            RESET
    =========================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background:
        radial-gradient(
          circle at top,
          #F8EEDF 0%,
          #F3E3CF 35%,
          #EAD7BE 70%,
          #E3CCAE 100%
        );
      color: var(--text);
      overflow-x: hidden;
    }

    /* ===========================
          SECCIÓN
    =========================== */

    .confirmation-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 100px 20px;
    }

    /* ===========================
          TARJETA
    =========================== */

    .confirmation-card {
      width: min(95vw, 650px);
      text-align: center;
      position: relative;
      z-index: 2;
      animation: fadeUp 1.2s ease;
    }

    /* ===========================
            ADORNO
    =========================== */

    .top-ornament {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      animation: float 6s ease-in-out infinite;
    }

    .top-ornament img {
      width: 100%;
    }

    /* ===========================
            TITULO
    =========================== */

      .title {
        font-size: 64px;
        color: var(--blue);
        font-weight: 600;
        letter-spacing: 5px;
        text-transform: uppercase;
        margin-top: 40px;
        margin-bottom: 20px;
      }

    /* ===========================
          DIVISOR
    =========================== */

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 45px;
    }

    .divider span {
      width: 140px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .divider i {
      color: var(--gold);
      font-size: 14px;
    }

    /* ===========================
          SUBTEXTO
    =========================== */

    .subtitle {
      font-size: 34px;
      color: var(--blue);
      line-height: 1.6;
      font-style: italic;
      margin-bottom: 35px;
    }

    .description {
      font-size: 28px;
      color: #6A675F;
      line-height: 1.7;
      margin-bottom: 60px;
    }

    .description strong {
      color: var(--blue);
      font-weight: 700;
    }

    /* ===========================
          BOTÓN
    =========================== */

    .confirm-btn {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 22px 58px;
      border-radius: 100px;
      text-decoration: none;
      color: white;
      font-size: 24px;
      letter-spacing: 1px;
      background: linear-gradient(180deg, #547A99, #355D7A);
      border: 2px solid rgba(183, 154, 99, 0.8);
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.15),
        inset 0 2px 4px rgba(255, 255, 255, 0.25),
        inset 0 -3px 5px rgba(0, 0, 0, 0.18);
      transition: 0.4s;
    }

    .confirm-btn span {
      position: relative;
      z-index: 2;
    }

    .confirm-btn i {
      margin-right: 12px;
    }

    /* ===========================
          BRILLO
    =========================== */

    .shine {
      position: absolute;
      top: -50%;
      left: -120%;
      width: 80px;
      height: 250%;
      transform: rotate(25deg);
      background: linear-gradient(transparent, rgba(255, 255, 255, 0.55), transparent);
    }

    /* ===========================
          HOVER
    =========================== */

    .confirm-btn:hover {
      transform: translateY(-8px);
      box-shadow: 0 22px 45px rgba(0, 0, 0, 0.20);
    }

    .confirm-btn:hover .shine {
      animation: shine 1s forwards;
    }

    /* ===========================
          PARTICULAS
    =========================== */

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      opacity: 0.35;
      filter: blur(1px);
    }

    .sparkle-1 {
      top: 18%;
      left: 18%;
      animation: twinkle 5s infinite;
    }

    .sparkle-2 {
      right: 16%;
      top: 24%;
      animation: twinkle 7s infinite;
    }

    .sparkle-3 {
      left: 20%;
      bottom: 18%;
      animation: twinkle 6s infinite;
    }

    .sparkle-4 {
      right: 18%;
      bottom: 15%;
      animation: twinkle 4s infinite;
    }

    /* ===========================
          ANIMACIONES
    =========================== */

    @keyframes shine {
      100% {
        left: 180%;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(60px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    /* ===========================
          RESPONSIVE
    =========================== */

    @media (max-width: 768px) {
      .title {
        font-size: 46px;
        letter-spacing: 3px;
      }

      .subtitle {
        font-size: 28px;
      }

      .description {
        font-size: 22px;
      }

      .confirm-btn {
        padding: 18px 35px;
        font-size: 20px;
      }

      .divider span {
        width: 80px;
      }

      .top-ornament {
        width: 170px;
      }
    }

    /* ===========================
            RIPPLE
    =========================== */

    .confirm-btn {
      position: relative;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(255, 255, 255, 0.35);
      animation: ripple 0.7s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <section class="confirmation-section">

    <div class="sparkle sparkle-1"></div>
    <div class="sparkle sparkle-2"></div>
    <div class="sparkle sparkle-3"></div>
    <div class="sparkle sparkle-4"></div>

    <div class="confirmation-card">
      <h2 class="title">Confirmación</h2>

      <div class="divider">
        <span></span>
        <i class="fa-solid fa-heart"></i>
        <span></span>
      </div>

      <p class="subtitle">
        Tu presencia hará<br>
        este día aún más especial.
      </p>

      <p class="description">
        Agradecemos confirmar<br>
        tu asistencia antes del<br>
        <strong>22 de agosto.</strong>
      </p>

      <a
        href="https://forms.gle/TUFORMULARIO"
        target="_blank"
        rel="noopener noreferrer"
        class="confirm-btn"
      >
        <span>
          <i class="fa-solid fa-envelope-open"></i>
          Confirmar asistencia
        </span>
        <div class="shine"></div>
      </a>
    </div>

  </section>

  <script>
    (function () {
      const card = document.querySelector('.confirmation-card');
      const button = document.querySelector('.confirm-btn');
      const shine = document.querySelector('.shine');
      const sparkles = document.querySelectorAll('.sparkle');

      if (!card || !button) return;

      /* Aparición al hacer scroll */
      card.style.opacity = '0';
      card.style.transform = 'translateY(80px)';

      const observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          card.style.transition = 'all 1.2s ease';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
          observer.unobserve(card);
        });
      }, { threshold: 0.25 });

      observer.observe(card);

      /* Brillo automático */
      if (shine) {
        setInterval(function () {
          shine.style.animation = 'none';
          void shine.offsetWidth;
          shine.style.animation = 'shine 1.2s ease';
        }, 6000);
      }

      /* Botón respirando */
      setInterval(function () {
        button.animate(
          [
            { transform: 'scale(1)' },
            { transform: 'scale(1.03)' },
            { transform: 'scale(1)' },
          ],
          { duration: 2500, easing: 'ease-in-out' },
        );
      }, 3500);

      /* Partículas flotantes */
      sparkles.forEach(function (sparkle) {
        let angle = Math.random() * 360;
        const radius = 10 + Math.random() * 18;

        function animate() {
          angle += 0.3;
          sparkle.style.transform =
            'translate(' + (Math.cos(angle) * radius) + 'px, ' + (Math.sin(angle) * radius) + 'px)';
          requestAnimationFrame(animate);
        }

        animate();
      });

      /* Efecto ripple */
      button.addEventListener('click', function (e) {
        const circle = document.createElement('span');
        const diameter = Math.max(button.clientWidth, button.clientHeight);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = diameter + 'px';
        circle.style.left = (e.clientX - button.offsetLeft - radius) + 'px';
        circle.style.top = (e.clientY - button.offsetTop - radius) + 'px';
        circle.classList.add('ripple');

        const old = button.getElementsByClassName('ripple')[0];
        if (old) old.remove();
        button.appendChild(circle);
      });

      /* Revelar texto */
      const texts = document.querySelectorAll(
        '.title, .divider, .subtitle, .description, .confirm-btn',
      );

      texts.forEach(function (el, index) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        setTimeout(function () {
          el.style.transition = 'all .8s ease';
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        }, 300 + (index * 180));
      });
    })();
  </script>
</body>
</html>
